<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sanjan — Sign In</title>
  <link rel="stylesheet" href="../styles/shared.css" />
  <style>
    html, body { overflow: hidden; height: 100%; }

    .screen {
      flex-direction: row;
      align-items: stretch;
      height: 100vh;
      background: var(--bg-card);
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 44px;
      position: relative;
      z-index: 1;
      overflow-y: auto;
    }

    .logo-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 36px;
    }

    .screen-title {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .screen-sub {
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 32px;
    }

    .form-fields { display: flex; flex-direction: column; gap: 18px; }

    .options-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .link-small {
      font-size: 12px; color: var(--accent-text);
      background: none; border: none; cursor: pointer; padding: 0;
      transition: color var(--transition);
      -webkit-app-region: no-drag;
    }
    .link-small:hover { color: var(--accent); }

    .signup-row { text-align: left; margin-top: 8px; }

    /* ── RIGHT PANEL ── */
    .right-panel {
      width: 50%;
      background: #2c2a22;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      gap: 28px;
    }

    /* decorative graph illustration */
    .graph-illustration {
      position: relative;
      width: 220px; height: 220px;
      z-index: 1;
    }

    .right-tagline {
      z-index: 1;
      text-align: center;
      padding: 0 32px;
    }
    .right-tagline h2 {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 700;
      color: #f0ebe0;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    .right-tagline p {
      font-size: 13px;
      color: #9c9080;
      line-height: 1.65;
    }

    /* orb inside right panel */
    .right-orb {
      position: absolute;
      border-radius: 50%; filter: blur(80px); pointer-events: none;
    }
    .right-orb-1 {
      width: 300px; height: 300px;
      top: -80px; right: -60px;
      background: radial-gradient(circle, rgba(107,79,160,0.25) 0%, transparent 70%);
    }
    .right-orb-2 {
      width: 200px; height: 200px;
      bottom: -40px; left: -40px;
      background: radial-gradient(circle, rgba(107,79,160,0.15) 0%, transparent 70%);
    }

    /* animated node graph */
    .node { position: absolute; border-radius: 50%; background: #9b7fd4; }
    .node-lg { width: 14px; height: 14px; box-shadow: 0 0 12px rgba(155,127,212,0.6); }
    .node-md { width: 9px;  height: 9px;  box-shadow: 0 0 8px rgba(155,127,212,0.4); }
    .node-sm { width: 6px;  height: 6px;  background: #6b4fa0; }

    @keyframes nodePulse {
      0%,100% { transform: scale(1);   opacity: 0.8; }
      50%      { transform: scale(1.3); opacity: 1;   }
    }
    .node { animation: nodePulse 3s ease-in-out infinite; }
    .node:nth-child(2) { animation-delay: 0.6s; }
    .node:nth-child(3) { animation-delay: 1.2s; }
    .node:nth-child(4) { animation-delay: 1.8s; }
    .node:nth-child(5) { animation-delay: 2.4s; }
  </style>
</head>
<body>
<div class="screen">
  <div class="drag-region"></div>

  <!-- ── LEFT ── -->
  <div class="left-panel animate-fade-up">

    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="10" r="4" fill="white" opacity="0.9"/>
          <circle cx="10" cy="28" r="4" fill="white" opacity="0.9"/>
          <circle cx="30" cy="28" r="4" fill="white" opacity="0.9"/>
          <line x1="20" y1="14" x2="10" y2="24" stroke="white" stroke-width="1.8" stroke-opacity="0.6"/>
          <line x1="20" y1="14" x2="30" y2="24" stroke="white" stroke-width="1.8" stroke-opacity="0.6"/>
          <line x1="14" y1="28" x2="26" y2="28" stroke="white" stroke-width="1.8" stroke-opacity="0.4"/>
        </svg>
      </div>
      <span class="logo-wordmark">San<span>jan</span></span>
    </div>

    <div class="screen-title">Welcome back</div>
    <div class="screen-sub">Sign in to your knowledge vault</div>

    <div class="form-fields">

      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input id="username" class="form-input" type="text" placeholder="your_username" autocomplete="username"/>
        </div>
        <span class="field-error" id="username-error">Please enter your username.</span>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input id="password" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password"/>
          <button class="pw-toggle no-drag" id="pwToggle" type="button">
            <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="password-error">Please enter your password.</span>
      </div>

      <div class="options-row">
        <label class="checkbox-label no-drag">
          <input type="checkbox" id="rememberMe"/>
          <div class="checkbox-box"></div>
          Remember me
        </label>
        <button class="link-small" id="forgotBtn" type="button">Forgot password?</button>
      </div>

      <button class="btn-primary no-drag" id="signInBtn" type="button">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>

      <div class="signup-row footer-nav">
        Don't have an account?
        <button class="btn-ghost no-drag" id="signupBtn" type="button">Sign up</button>
      </div>

    </div>
  </div>

  <!-- ── RIGHT ── -->
  <div class="right-panel">
    <div class="right-orb right-orb-1"></div>
    <div class="right-orb right-orb-2"></div>

    <!-- Animated knowledge graph SVG -->
    <div class="graph-illustration">
      <svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- edges -->
        <line x1="110" y1="50"  x2="50"  y2="130" stroke="#6b4fa0" stroke-width="1.5" stroke-opacity="0.5"/>
        <line x1="110" y1="50"  x2="170" y2="130" stroke="#6b4fa0" stroke-width="1.5" stroke-opacity="0.5"/>
        <line x1="110" y1="50"  x2="110" y2="150" stroke="#6b4fa0" stroke-width="1.5" stroke-opacity="0.3"/>
        <line x1="50"  y1="130" x2="110" y2="170" stroke="#9b7fd4" stroke-width="1"   stroke-opacity="0.4"/>
        <line x1="170" y1="130" x2="110" y2="170" stroke="#9b7fd4" stroke-width="1"   stroke-opacity="0.4"/>
        <line x1="50"  y1="130" x2="30"  y2="180" stroke="#6b4fa0" stroke-width="1"   stroke-opacity="0.25"/>
        <line x1="170" y1="130" x2="190" y2="180" stroke="#6b4fa0" stroke-width="1"   stroke-opacity="0.25"/>
        <!-- dashed AI link -->
        <line x1="50" y1="130" x2="170" y2="130" stroke="#9b7fd4" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="5 4"/>
        <!-- nodes -->
        <circle cx="110" cy="50"  r="9"  fill="#6b4fa0" opacity="0.9"/>
        <circle cx="110" cy="50"  r="5"  fill="#9b7fd4"/>
        <circle cx="50"  cy="130" r="7"  fill="#6b4fa0" opacity="0.8"/>
        <circle cx="50"  cy="130" r="4"  fill="#9b7fd4"/>
        <circle cx="170" cy="130" r="7"  fill="#6b4fa0" opacity="0.8"/>
        <circle cx="170" cy="130" r="4"  fill="#9b7fd4"/>
        <circle cx="110" cy="170" r="5"  fill="#6b4fa0" opacity="0.7"/>
        <circle cx="110" cy="170" r="3"  fill="#9b7fd4"/>
        <circle cx="30"  cy="180" r="4"  fill="#543d80" opacity="0.6"/>
        <circle cx="190" cy="180" r="4"  fill="#543d80" opacity="0.6"/>
        <circle cx="110" cy="150" r="3"  fill="#9b7fd4" opacity="0.5"/>
      </svg>
    </div>

    <div class="right-tagline">
      <h2>Your knowledge,<br/>connected.</h2>
      <p>Sanjan finds the hidden links<br/>between your notes — automatically.</p>
    </div>
  </div>

</div>

<script>
  const eyeOpen  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeSlash = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  document.getElementById('pwToggle').addEventListener('click', () => {
    const inp = document.getElementById('password');
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    document.getElementById('eyeIcon').innerHTML = isText ? eyeOpen : eyeSlash;
  });

  function showError(fId, eId) { document.getElementById(fId).classList.add('error'); document.getElementById(eId).classList.add('visible'); }
  function clearError(fId, eId) { document.getElementById(fId).classList.remove('error'); document.getElementById(eId).classList.remove('visible'); }

  document.getElementById('username').addEventListener('input', () => clearError('username','username-error'));
  document.getElementById('password').addEventListener('input', () => clearError('password','password-error'));

  document.getElementById('signInBtn').addEventListener('click', () => {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    let valid = true;
    if (!u) { showError('username','username-error'); valid = false; }
    if (!p) { showError('password','password-error'); valid = false; }
    if (!valid) return;
    const btn = document.getElementById('signInBtn');
    btn.classList.add('loading'); btn.disabled = true;
    setTimeout(() => { btn.classList.remove('loading'); btn.disabled = false; if (window.electron) window.electron.navigate('home'); }, 1600);
  });

  document.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('signInBtn').click(); });
  document.getElementById('signupBtn').addEventListener('click', () => { if (window.electron) window.electron.navigate('signup'); });
  document.getElementById('forgotBtn').addEventListener('click', () => { if (window.electron) window.electron.navigate('forgotPassword'); });
</script>
</body>
</html>
